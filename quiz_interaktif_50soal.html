<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Matematika 50 Soal - Kelas 1-2 SD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            margin-top: 15px;
        }

        .progress-fill {
            height: 100%;
            background: white;
            transition: width 0.3s ease;
        }

        .content {
            padding: 40px 30px;
        }

        .question-container {
            margin-bottom: 40px;
            display: none;
        }

        .question-container.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            color: #667eea;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        .option:hover {
            background: #f0f0f0;
            border-color: #667eea;
        }

        .option input[type="radio"] {
            cursor: pointer;
            width: 20px;
            height: 20px;
            margin-right: 15px;
            accent-color: #667eea;
        }

        .option label {
            cursor: pointer;
            flex: 1;
            font-size: 16px;
            margin: 0;
        }

        .option.correct {
            background: #e8f5e9;
            border-color: #4caf50;
        }

        .option.correct::after {
            content: '✓ Benar!';
            color: #4caf50;
            font-weight: bold;
            margin-left: auto;
        }

        .option.incorrect {
            background: #ffebee;
            border-color: #f44336;
        }

        .option.incorrect::after {
            content: '✗ Salah';
            color: #f44336;
            font-weight: bold;
            margin-left: auto;
        }

        .feedback {
            margin-top: 15px;
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .feedback.incorrect {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: space-between;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-next {
            background: #667eea;
            color: white;
            flex: 1;
        }

        .btn-next:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-next:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-prev {
            background: #f0f0f0;
            color: #333;
        }

        .btn-prev:hover {
            background: #e0e0e0;
        }

        .score-display {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .score-display.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .score-number {
            font-size: 72px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .score-text {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
        }

        .score-detail {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 16px;
        }

        .btn-reset {
            background: #4caf50;
            color: white;
            margin-top: 20px;
        }

        .btn-reset:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }

        .category-selector {
            margin-bottom: 20px;
        }

        .category-selector label {
            font-weight: 600;
            display: block;
            margin-bottom: 10px;
            color: #667eea;
        }

        .category-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .category-btn {
            padding: 12px;
            background: #f0f0f0;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .category-btn:hover {
            border-color: #667eea;
            background: #f9f9f9;
        }

        .category-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .start-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .start-screen h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
        }

        .start-screen p {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-start {
            background: #667eea;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
        }

        .btn-start:hover {
            background: #5568d3;
        }

        .question-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
        }

        .results-summary {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .results-summary h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-correct {
            color: #4caf50;
            font-weight: bold;
        }

        .result-incorrect {
            color: #f44336;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .category-buttons {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .header h1 {
                font-size: 22px;
            }

            .question-text {
                font-size: 16px;
            }
        }
    </style>
</head>

        });

        function setupCategoryButtons() {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentCategory = this.dataset.category;
                });
            });
        }

        function setupStartButton() {
            document.getElementById('startBtn').addEventListener('click', startQuiz);
        }

        function setupNavigationButtons() {
            document.getElementById('nextBtn').addEventListener('click', nextQuestion);
            document.getElementById('prevBtn').addEventListener('click', previousQuestion);
        }

        function setupResetButton() {
            document.getElementById('resetBtn').addEventListener('click', resetQuiz);
        }

        function startQuiz() {
            quizStarted = true;
            currentQuestionIndex = 0;
            answers = {};
            currentQuestions = [...questionsData[currentCategory]];

            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('scoreScreen').classList.remove('show');

            updateHeaderSubtitle();
            displayQuestion();
        }

        function updateHeaderSubtitle() {
            const categoryNames = {
                arithmetic: 'Arithmetic - Operasi Hitung (50 Soal)',
                logic: 'Numeric Logic - Teka-teki (50 Soal)',
                spatial: 'Spatial - Ruang (50 Soal)',
                memory: 'Memory - Ingatan (50 Soal)'
            };
            document.getElementById('headerSubtitle').textContent = categoryNames[currentCategory];
        }

        function displayQuestion() {
            const questionList = document.getElementById('questionList');
            questionList.innerHTML = '';

            currentQuestions.forEach((question, index) => {
                const container = document.createElement('div');
                container.className = 'question-container' + (index === currentQuestionIndex ? ' active' : '');

                let optionsHTML = '';
                question.options.forEach((option, optionIndex) => {
                    const isAnswered = answers[question.id] !== undefined;
                    const isCorrect = optionIndex === question.correct;
                    const isSelected = answers[question.id] === optionIndex;

                    let optionClass = 'option';
                    if (isAnswered) {
                        if (isSelected && isCorrect) {
                            optionClass += ' correct';
                        } else if (isSelected && !isCorrect) {
                            optionClass += ' incorrect';
                        } else if (!isSelected && isCorrect) {
                            optionClass += ' correct';
                        }
                    }

                    optionsHTML += `
                        <label class="${optionClass}">
                            <input type="radio" name="question-${question.id}" value="${optionIndex}"
                                ${isSelected ? 'checked' : ''}
                                ${isAnswered ? 'disabled' : ''}
                                onchange="selectAnswer(${question.id}, ${optionIndex})">
                            <span>${String.fromCharCode(65 + optionIndex)}</span>. ${option}
                        </label>
                    `;
                });

                let feedbackHTML = '';
                if (answers[question.id] !== undefined) {
                    const isCorrect = answers[question.id] === question.correct;
                    feedbackHTML = `
                        <div class="feedback show ${isCorrect ? 'correct' : 'incorrect'}">
                            ${isCorrect ? '✓ Benar!' : '✗ Salah'} - ${question.explanation}
                        </div>
                    `;
                }

                container.innerHTML = `
                    <div class="question-number">Soal ${index + 1} dari ${currentQuestions.length}</div>
                    <div class="question-text">${question.question}</div>
                    <div class="options">${optionsHTML}</div>
                    ${feedbackHTML}
                `;

                questionList.appendChild(container);
            });

            updateProgress();
            updateButtonStates();
            updateQuestionInfo();
        }

        function selectAnswer(questionId, optionIndex) {
            answers[questionId] = optionIndex;
            displayQuestion();
        }

        function nextQuestion() {
            if (currentQuestionIndex < currentQuestions.length - 1) {
                currentQuestionIndex++;
                displayQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuestion();
            }
        }

        function updateButtonStates() {
            const nextBtn = document.getElementById('nextBtn');
            const prevBtn = document.getElementById('prevBtn');
            const currentQuestion = currentQuestions[currentQuestionIndex];

            nextBtn.disabled = answers[currentQuestion.id] === undefined;
            prevBtn.style.display = currentQuestionIndex > 0 ? 'block' : 'none';

            if (currentQuestionIndex === currentQuestions.length - 1) {
                nextBtn.textContent = answers[currentQuestion.id] !== undefined ? '✓ Lihat Hasil' : 'Jawab dulu';
            } else {
                nextBtn.textContent = 'Soal Berikutnya →';
            }
        }

        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / currentQuestions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function updateQuestionInfo() {
            document.getElementById('questionInfo').textContent =
                `Soal ${currentQuestionIndex + 1} dari ${currentQuestions.length}`;
        }

        function showResults() {
            let correct = 0;
            currentQuestions.forEach(question => {
                if (answers[question.id] === question.correct) {
                    correct++;
                }
            });

            const percentage = Math.round((correct / currentQuestions.length) * 100);
            const message = getMessage(percentage);

            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('scoreScreen').classList.add('show');
            document.getElementById('scoreNumber').textContent = `${correct}/${currentQuestions.length}`;
            document.getElementById('scoreText').textContent = `Skor: ${percentage}%`;
            document.getElementById('scoreDetail').textContent = message;

            // Generate results summary
            let summaryHTML = '<h3>📊 Rincian Jawaban:</h3>';
            let correctCount = 0;
            let incorrectCount = 0;

            currentQuestions.forEach((question, index) => {
                const isCorrect = answers[question.id] === question.correct;
                if (isCorrect) correctCount++;
                else incorrectCount++;

                const resultClass = isCorrect ? 'result-correct' : 'result-incorrect';
                summaryHTML += `
                    <div class="result-item">
                        <span>Soal ${index + 1}</span>
                        <span class="${resultClass}">${isCorrect ? '✓' : '✗'}</span>
                    </div>
                `;
            });

            summaryHTML += `
                <div class="result-item" style="margin-top: 10px; padding-top: 10px; border-top: 2px solid #667eea;">
                    <span><strong>Total Benar</strong></span>
                    <span class="result-correct">${correctCount}</span>
                </div>
                <div class="result-item">
                    <span><strong>Total Salah</strong></span>
                    <span class="result-incorrect">${incorrectCount}</span>
                </div>
            `;

            document.getElementById('resultsSummary').innerHTML = summaryHTML;
        }

        function getMessage(percentage) {
            if (percentage === 100) return '🌟 Sempurna! Kamu jenius!';
            if (percentage >= 90) return '🎉 Luar biasa! Kamu hebat!';
            if (percentage >= 80) return '👏 Sangat bagus! Teruskan!';
            if (percentage >= 70) return '✅ Bagus! Belajar lagi ya!';
            if (percentage >= 60) return '📚 Cukup baik! Semangat belajar!';
            if (percentage >= 50) return '💪 Terus belajar ya!';
            return '🔥 Jangan menyerah, coba lagi!';
        }

        function resetQuiz() {
            document.getElementById('startScreen').style.display = 'block';
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('scoreScreen').classList.remove('show');
            currentQuestionIndex = 0;
            answers = {};
            quizStarted = false;
            document.querySelectorAll('.category-btn').forEach((btn, index) => {
                btn.classList.toggle('active', index === 0);
            });
            currentCategory = 'arithmetic';
        }
    </script>
</body>
</html>
